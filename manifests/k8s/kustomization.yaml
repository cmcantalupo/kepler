apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - daemonset.yaml
  - service.yaml
  - servicemonitor.yaml
  - prometheus-rbac.yaml
  # NOTE: To enable the static sushy service uncomment the following lines
  # - redfish-secret.yaml
  # - sushy-deployment.yaml
  # - sushy-service.yaml
# NOTE: When enabling sushy-static above, also uncomment the following patch
# to enable redfish functionality with sushy-static dependency
# patches:
#   - path: patches/enable-redfish.yaml

# NOTE: To enable resctrl/AET power monitoring, uncomment ONE of the following patches.
# Requires kernel with Application Energy Telemetry (AET) support and
# resctrl filesystem mounted at /sys/fs/resctrl.
#
# ACTIVE MODE: Kepler creates and manages resctrl groups (requires write access)
# patches:
#   - path: patches/enable-resctrl.yaml
#
# PASSIVE MODE: Kepler discovers existing groups created by external orchestrator (read-only)
# Recommended for unprivileged deployments with an external resctrl manager
# patches:
#   - path: patches/enable-resctrl-passive.yaml
