# Kepler configuration for e2e tests with resctrl/AET enabled.
# Requires Intel Xeon with AET support (Clearwater Forest or later)
# and the resctrl filesystem mounted at /sys/fs/resctrl.
log:
  level: debug
  format: text
monitor:
  interval: 3s
  staleness: 10s
  maxTerminated: 100
  minTerminatedEnergyThreshold: 1
host:
  procfs: /proc
  sysfs: /sys
exporter:
  prometheus:
    enabled: true
    metricsLevel:
      - node
      - process
      - container
      - vm
      - pod
web:
  listenAddresses:
    - :28283
kube:
  enabled: true
  nodeName: ""
  podInformer:
    mode: apiserver
experimental:
  resctrl:
    enabled: true
